name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Compile code
      run: npm run compile

    - name: Lint code
      run: npm run lint

    - name: Package extension VSIX
      run: npx @vscode/vsce package --allow-missing-repository --no-dependencies --allow-star-activation

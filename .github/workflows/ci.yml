name: CI

on:
  push:
    branches: [ main, development ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, development ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Compile code
      run: npm run compile

    - name: Lint code
      run: npm run lint

    - name: Package extension VSIX
      run: npx @vscode/vsce package --allow-missing-repository --no-dependencies --allow-star-activation

    - name: Upload VSIX Artifact
      uses: actions/upload-artifact@v4
      with:
        name: falkon-extension-vsix
        path: "*.vsix"

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: "*.vsix"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
